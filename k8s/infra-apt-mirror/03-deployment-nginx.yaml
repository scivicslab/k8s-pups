apiVersion: apps/v1
kind: Deployment
metadata:
  name: apt-mirror-nginx
  namespace: infra-apt-mirror
  labels:
    app: apt-mirror-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apt-mirror-nginx
  template:
    metadata:
      labels:
        app: apt-mirror-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-bookworm
        ports:
        - containerPort: 80
          protocol: TCP
        volumeMounts:
        - name: mirror-data
          mountPath: /usr/share/nginx/html
          subPath: mirror
          readOnly: true
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
          readOnly: true
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 10
      volumes:
      - name: mirror-data
        persistentVolumeClaim:
          claimName: apt-mirror-data-pvc
      - name: nginx-config
        configMap:
          name: apt-mirror-nginx-config
