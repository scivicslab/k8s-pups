# ReferenceGrant: allow HTTPRoutes in sc-account-bg to access k8s-pups services
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-sc-account-bg
  namespace: k8s-pups
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: sc-account-bg
  to:
    - group: ""
      kind: Service
---
# ReferenceGrant: allow HTTPRoutes in sc-account-bg to access user-pods services
# (needed for per-session HTTPRoutes that route to user tool pods)
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-sc-account-bg
  namespace: user-pods
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: sc-account-bg
  to:
    - group: ""
      kind: Service
---
# HTTPRoute for set1 (Blue): add /pups rule
# RequestHeaderModifier sets X-Forwarded-Proto because Envoy Gateway
# overwrites it based on listener protocol (HTTP), but the real client
# connection is HTTPS terminated at HAProxy.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-pups-set1-route
  namespace: sc-account-bg
spec:
  parentRefs:
    - name: sc-account-set1-gateway
      namespace: sc-account-bg
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /pups
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
      backendRefs:
        - name: k8s-pups-controller
          namespace: k8s-pups
          port: 8080
---
# HTTPRoute for set2 (Green): add /pups rule
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-pups-set2-route
  namespace: sc-account-bg
spec:
  parentRefs:
    - name: sc-account-set2-gateway
      namespace: sc-account-bg
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /pups
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
      backendRefs:
        - name: k8s-pups-controller
          namespace: k8s-pups
          port: 8080
---
# SecurityPolicy for set1 (Blue) dashboard route.
# Establishes Keycloak browser session via Envoy Gateway OIDC on dashboard access,
# enabling SSO for subsequent per-session SecurityPolicies (no re-login needed).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: pups-dashboard-sp-set1
  namespace: sc-account-bg
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: k8s-pups-set1-route
  oidc:
    provider:
      issuer: https://192.168.5.25/sc-account-keycloak/realms/sc-account
      authorizationEndpoint: https://192.168.5.25/sc-account-keycloak/realms/sc-account/protocol/openid-connect/auth
      tokenEndpoint: http://keycloak-set2.sc-account-bg.svc:8080/sc-account-keycloak/realms/sc-account/protocol/openid-connect/token
    clientID: k8s-pups
    clientSecret:
      name: k8s-pups-oidc-secret
    redirectURL: https://192.168.5.25/pups/oauth2/callback
    scopes:
      - openid
      - profile
    cookieNames:
      idToken: pups-dashboard-id
---
# SecurityPolicy for set2 (Green) dashboard route.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: pups-dashboard-sp-set2
  namespace: sc-account-bg
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: k8s-pups-set2-route
  oidc:
    provider:
      issuer: https://192.168.5.25/sc-account-keycloak/realms/sc-account
      authorizationEndpoint: https://192.168.5.25/sc-account-keycloak/realms/sc-account/protocol/openid-connect/auth
      tokenEndpoint: http://keycloak-set2.sc-account-bg.svc:8080/sc-account-keycloak/realms/sc-account/protocol/openid-connect/token
    clientID: k8s-pups
    clientSecret:
      name: k8s-pups-oidc-secret
    redirectURL: https://192.168.5.25/pups/oauth2/callback
    scopes:
      - openid
      - profile
    cookieNames:
      idToken: pups-dashboard-id
