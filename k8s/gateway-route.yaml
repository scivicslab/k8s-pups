# EnvoyProxy: pin NodePort 31084 for HAProxy routing
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: k8s-pups-proxy
  namespace: k8s-pups
spec:
  logging:
    level:
      default: warn
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        externalTrafficPolicy: Cluster
        patch:
          type: StrategicMerge
          value:
            spec:
              ports:
              - name: http-80
                nodePort: 31084
                port: 80
---
# Gateway: k8s-pups own gateway in k8s-pups namespace
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: k8s-pups-gateway
  namespace: k8s-pups
spec:
  gatewayClassName: envoy
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: k8s-pups-proxy
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
# HTTPRoute: /pups -> k8s-pups-controller:8080
# RequestHeaderModifier sets X-Forwarded-Proto because Envoy Gateway
# overwrites it based on listener protocol (HTTP), but the real client
# connection is HTTPS terminated at HAProxy.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-pups-route
  namespace: k8s-pups
spec:
  parentRefs:
  - name: k8s-pups-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /pups
    filters:
    - type: RequestHeaderModifier
      requestHeaderModifier:
        set:
        - name: X-Forwarded-Proto
          value: https
    backendRefs:
    - name: k8s-pups-controller
      port: 8080
