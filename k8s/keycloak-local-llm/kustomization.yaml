apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dedicated Keycloak for k8s-pups-local-llm
# NodePort 31089, path /local-llm-auth
# Usage: kubectl apply -f namespace.yaml && kubectl apply -k .

namespace: keycloak-local-llm

resources:
- serviceaccount.yaml
- spc-keycloak-postgres.yaml
- spc-keycloak.yaml
- postgres-pvc.yaml
- postgres-deployment.yaml
- postgres-service.yaml
- keycloak-deployment.yaml
- keycloak-service.yaml
- gateway.yaml
- networkpolicy.yaml

labels:
- pairs:
    env: local-llm
    project: keycloak-local-llm
  includeSelectors: false
