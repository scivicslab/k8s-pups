apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: k8s-pups-spc
  namespace: k8s-pups-local-llm
spec:
  provider: vault
  parameters:
    vaultAddress: "http://vault.infra-vault.svc.cluster.local:8200"
    roleName: "k8s-pups-local-llm-role"
    objects: |
      - objectName: "oidc-client-secret"
        secretPath: "k8s-pups-local-llm/data/oidc-client"
        secretKey: "client-secret"
      - objectName: "ldap-bind-password"
        secretPath: "k8s-pups-local-llm/data/ldap"
        secretKey: "bind-password"
  secretObjects:
  - secretName: k8s-pups-oidc-secret
    type: Opaque
    data:
    - key: client-secret
      objectName: oidc-client-secret
