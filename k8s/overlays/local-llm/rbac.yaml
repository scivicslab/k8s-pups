# Role in user-pods-local-llm namespace: manage Pods and Services
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-pups-pod-manager
  namespace: user-pods-local-llm
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "persistentvolumeclaims", "configmaps"]
    verbs: ["create", "delete", "get", "list", "watch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-pups-pod-manager-binding
  namespace: user-pods-local-llm
subjects:
  - kind: ServiceAccount
    name: vault-auth
    namespace: k8s-pups-local-llm
roleRef:
  kind: Role
  name: k8s-pups-pod-manager
  apiGroup: rbac.authorization.k8s.io
---
# Role in k8s-pups-local-llm namespace: manage HTTPRoutes and SecurityPolicies
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-pups-route-manager
  namespace: k8s-pups-local-llm
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["create", "delete", "get", "list"]
  - apiGroups: ["gateway.envoyproxy.io"]
    resources: ["securitypolicies"]
    verbs: ["create", "delete", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-pups-route-manager-binding
  namespace: k8s-pups-local-llm
subjects:
  - kind: ServiceAccount
    name: vault-auth
    namespace: k8s-pups-local-llm
roleRef:
  kind: Role
  name: k8s-pups-route-manager
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole: read node status and metrics (unique name for this deployment)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-pups-local-llm-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["persistentvolumes", "persistentvolumeclaims", "resourcequotas"]
    verbs: ["list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-pups-local-llm-node-reader-binding
subjects:
  - kind: ServiceAccount
    name: vault-auth
    namespace: k8s-pups-local-llm
roleRef:
  kind: ClusterRole
  name: k8s-pups-local-llm-node-reader
  apiGroup: rbac.authorization.k8s.io
