apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-pups-controller
  namespace: k8s-pups
  labels:
    app: k8s-pups-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-pups-controller
  template:
    metadata:
      labels:
        app: k8s-pups-controller
    spec:
      serviceAccountName: vault-auth
      volumes:
      - name: vault-secrets
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: k8s-pups-spc
      containers:
      - name: k8s-pups
        image: k8s-pups
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for vault secrets..."
          while [ ! -f /vault/secrets/oidc-client-secret ]; do sleep 1; done
          while [ ! -f /vault/secrets/ldap-bind-password ]; do sleep 1; done
          echo "Vault secrets available"
          export K8S_PUPS_OIDC_SECRET=$(cat /vault/secrets/oidc-client-secret)
          export K8SPUPS_WORKSPACE_LDAP_BIND_PASSWORD=$(cat /vault/secrets/ldap-bind-password)
          exec java -Dquarkus.http.host=0.0.0.0 -Djava.util.logging.manager=org.jboss.logmanager.LogManager -jar /deployments/quarkus-run.jar
        volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
          readOnly: true
        env:
        - name: QUARKUS_OIDC_AUTH_SERVER_URL
          value: "http://keycloak-unit1.sc-account.svc:8080/sc-auth/realms/sc-account"
        - name: K8SPUPS_UNLIMITED_USERS
          value: "testadmin,devteam"
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /pups/q/health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /pups/q/health/ready
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
