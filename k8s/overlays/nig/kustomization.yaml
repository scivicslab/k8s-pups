apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NIG supercomputer k0s cluster overlay (single deployment, no Blue/Green)
# Usage: kubectl apply -k overlays/nig

namespace: k8s-pups

resources:
# Gateway
- gateway.yaml
# SecretProviderClass
- spc-k8s-pups.yaml
# Deployment and Service
- k8s-pups-deployment.yaml
- k8s-pups-service.yaml
# Shared
- rbac.yaml
- networkpolicy.yaml

labels:
- pairs:
    env: nig
    project: k8s-pups
  includeSelectors: false

# NIG cluster container images
images:
- name: k8s-pups
  newName: 10.96.0.100:5000/k8s-pups
  newTag: 0.1.0-2603251700
