# Application
quarkus.application.name=k8s-pups
quarkus.http.port=8080
quarkus.http.root-path=${BASE_PATH:/pups}

# Proxy: trust X-Forwarded-* headers from HAProxy/Envoy Gateway
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.allow-x-forwarded=true

# OIDC (Keycloak)
quarkus.oidc.enabled=true
quarkus.oidc.auth-server-url=${QUARKUS_OIDC_AUTH_SERVER_URL:https://192.168.5.25/sc-account-keycloak/realms/sc-account}
quarkus.oidc.client-id=k8s-pups
quarkus.oidc.credentials.secret=${K8S_PUPS_OIDC_SECRET}
quarkus.oidc.application-type=web-app
quarkus.oidc.authentication.redirect-path=${BASE_PATH:/pups}/dashboard
quarkus.oidc.token.refresh-expired=true
# Override OIDC endpoint paths so all server-to-server requests use the
# internal auth-server-url instead of the external URLs from OIDC discovery.
# Without this, the pod sends requests to https://192.168.5.25 which HAProxy
# may route to a different Keycloak set (Blue/Green source-IP routing).
quarkus.oidc.token-path=/protocol/openid-connect/token
quarkus.oidc.jwks-path=/protocol/openid-connect/certs
quarkus.oidc.authentication.session-age-extension=PT2H
quarkus.tls.trust-all=true

# HTTP Auth Permissions (order: specific paths first)
quarkus.http.auth.permission.public.paths=/
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.health.paths=/q/*
quarkus.http.auth.permission.health.policy=permit
quarkus.http.auth.permission.authenticated.paths=/dashboard,/session/*,/storage/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Kubernetes Client
quarkus.kubernetes-client.trust-certs=true

# k8s-pups configuration
k8spups.user-pods-namespace=${K8SPUPS_USER_PODS_NAMESPACE:user-pods}
k8spups.controller-namespace=${K8SPUPS_CONTROLLER_NAMESPACE:k8s-pups}
k8spups.httproute-namespace=${K8SPUPS_HTTPROUTE_NAMESPACE:sc-account-bg}
k8spups.gateway-names=${K8SPUPS_GATEWAY_NAMES:sc-account-set1-gateway,sc-account-set2-gateway}
k8spups.storage-size-options=${K8SPUPS_STORAGE_SIZE_OPTIONS:20Gi,50Gi,100Gi,500Gi,1Ti}
k8spups.default-storage-size=${K8SPUPS_DEFAULT_STORAGE_SIZE:100Gi}
k8spups.idle-timeout-minutes=${K8SPUPS_IDLE_TIMEOUT_MINUTES:30}
k8spups.max-sessions=${K8SPUPS_MAX_SESSIONS:100}
k8spups.max-sessions-per-user=${K8SPUPS_MAX_SESSIONS_PER_USER:2}
k8spups.unlimited-users=${K8SPUPS_UNLIMITED_USERS:testadmin}

# Envoy Gateway SecurityPolicy OIDC config for session routes
k8spups.session-oidc.issuer=https://192.168.5.25/sc-account-keycloak/realms/sc-account
k8spups.session-oidc.authorization-endpoint=https://192.168.5.25/sc-account-keycloak/realms/sc-account/protocol/openid-connect/auth
k8spups.session-oidc.token-endpoint=${K8SPUPS_SESSION_OIDC_TOKEN_ENDPOINT:http://keycloak-set2.sc-account-bg.svc:8080/sc-account-keycloak/realms/sc-account/protocol/openid-connect/token}
k8spups.session-oidc.client-id=k8s-pups
k8spups.session-oidc.secret-name=k8s-pups-oidc-secret
# Use internal cluster URL for JWKS so Envoy Gateway can fetch without TLS issues
k8spups.session-oidc.jwks-uri=${K8SPUPS_SESSION_OIDC_JWKS_URI:http://keycloak-set2.sc-account-bg.svc:8080/sc-account-keycloak/realms/sc-account/protocol/openid-connect/certs}
